<!DOCTYPE html>
<html lang="ko">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메이플 월드</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        #game-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        .status-panel {
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .betting-panel {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 5px;
        }
        input, select, button {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        
        /* 💡 배팅 금액 입력창 우측 너비 축소 (80px로 제한) */
        #bet-amount {
            width: 80px;
            text-align: center;
        }

        /* 💡 배팅 전용 버튼 스타일 (+, -, MAX) */
        .bet-ctrl-btn {
            background-color: #e1e1e1;
            color: #333;
            font-weight: bold;
            cursor: pointer;
            padding: 10px 14px;
        }
        .bet-ctrl-btn:hover {
            background-color: #d2d2d2;
        }
        
        #start-btn {
            background-color: #ff9900;
            color: white;
            cursor: pointer;
            border: none;
            font-weight: bold;
            padding: 10px 20px;
            margin-left: 10px;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        /* 경기장 스타일 */
        #track {
            position: relative;
            width: 100%;
            height: 200px;
            background-color: #e2f0d9; /* 헤네시스 느낌 풀밭 색상 */
            border: 3px solid #70ad47;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 20px;
        }
        .lane:first-child {
            border-bottom: 2px dashed #70ad47;
        }

        .lane {
            position: relative;
            height: 100px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
        }
        
        /* 💡 부드러운 애니메이션을 위해 transition을 브라우저 최적화 속도(0.05s)로 세팅 */
        .character {
            position: absolute;
            left: 10px;
            width: 60px;
            height: 60px;
            transition: left 0.05s linear; 
            transform: scaleX(-1); 
        }
        
        .finish-line {
            position: absolute;
            right: 20px;
            top: 0;
            width: 5px;
            height: 100%;
            background-color: red;
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1>헤네시스 비밀 도박장</h1>
    
    <div class="status-panel">
        내 잔액: <span id="meso-display">2000</span>메소
    </div>

    <div class="betting-panel">
        <label for="bet-target">배팅 대상: </label>
        <select id="bet-target">
            <option value="mushroom">주황버섯</option>
            <option value="slime">슬라임</option>
        </select>

        <label for="bet-amount" style="margin-left: 10px;">금액: </label>
        <button class="bet-ctrl-btn" onclick="changeBet(-100)">-</button>
        <input type="number" id="bet-amount" value="100" min="100" step="100">
        <button class="bet-ctrl-btn" onclick="changeBet(100)">+</button>
        <button class="bet-ctrl-btn" style="background-color: #ffcc00;" onclick="setBetMax()">MAX</button>

        <button id="start-btn" onclick="startRace()">경기 시작!</button>
    </div>

    <div id="track">
        <div class="lane">
            <img id="mushroom" class="character" src="mushroom.webp" alt="주황버섯">
        </div>
        <div class="lane">
            <img id="slime" class="character" src="slime.webp" alt="슬라임">
        </div>
        <div class="finish-line"></div>
    </div>
    
    <h2 id="result-text" style="margin-top: 20px; color: #333;"></h2>
</div>

<script>
    let myMeso = 2000;
    let raceInterval;
    let isRacing = false;

    // 💡 금액 증감 (+, -) 함수
    function changeBet(amount) {
        if (isRacing) return;
        const betInput = document.getElementById('bet-amount');
        let currentBet = parseInt(betInput.value) || 0;
        let newBet = currentBet + amount;
        
        if (newBet < 100) newBet = 100; // 최소 금액 제한
        if (newBet > myMeso) newBet = Math.floor(myMeso / 100) * 100; // 보유금액 초과 방지 (100단위 끊기)
        if (myMeso < 100) newBet = 100; // 소지금 부족 시 기본값

        betInput.value = newBet;
    }

    // 💡 MAX 버튼 함수
    function setBetMax() {
        if (isRacing) return;
        const betInput = document.getElementById('bet-amount');
        // 보유 머니를 100원 단위로 딱 떨어지게 올인
        let maxBet = Math.floor(myMeso / 100) * 100;
        betInput.value = maxBet < 100 ? 100 : maxBet;
    }

    function startRace() {
        if (isRacing) return;

        const betTarget = document.getElementById('bet-target').value;
        const betAmount = parseInt(document.getElementById('bet-amount').value);
        const resultText = document.getElementById('result-text');

        // 유효성 검사
        if (isNaN(betAmount) || betAmount < 100) {
            alert("최소 배팅 금액은 100메소입니다!");
            return;
        }
        if (betAmount > myMeso) {
            alert("보유한 메소보다 많이 걸 수 없습니다!");
            return;
        }

        // 배팅 금액 차감 및 상태 변경
        myMeso -= betAmount;
        document.getElementById('meso-display').innerText = myMeso;
        isRacing = true;
        document.getElementById('start-btn').disabled = true;
        resultText.innerText = "치열하게 달리는 중...!";

        // 캐릭터 위치 초기화
        const mushroom = document.getElementById('mushroom');
        const slime = document.getElementById('slime');
        let mushroomLeft = 10;
        let slimeLeft = 10;
        
        mushroom.style.transition = 'none';
        slime.style.transition = 'none';
        mushroom.style.left = mushroomLeft + 'px';
        slime.style.left = slimeLeft + 'px';
        
        setTimeout(() => {
            mushroom.style.transition = 'left 0.05s linear';
            slime.style.transition = 'left 0.05s linear';
            
            // 💡 [자연스러운 움직임 핵심 개조]
            // 주기를 0.05초(50ms)로 여유 있게 늦추는 대신, 프레임이 안 끊기도록 transition 시간과 100% 동기화했습니다.
            // 속도는 기존 미쳐 날뛰던 속도보다 대략 2~3배 정도 편안하고 자연스럽게 늦췄습니다.
            raceInterval = setInterval(() => {
                mushroomLeft += Math.floor(Math.random() * 16);
                slimeLeft += Math.floor(Math.random() * 16);

                mushroom.style.left = mushroomLeft + 'px';
                slime.style.left = slimeLeft + 'px';

                const trackWidth = document.getElementById('track').clientWidth - 80; 

                if (mushroomLeft >= trackWidth || slimeLeft >= trackWidth) {
                    clearInterval(raceInterval);
                    isRacing = false;
                    document.getElementById('start-btn').disabled = false;

                    let winner = "";
                    if (mushroomLeft === slimeLeft) {
                        winner = Math.random() > 0.5 ? "mushroom" : "slime";
                    } else {
                        winner = mushroomLeft > slimeLeft ? "mushroom" : "slime";
                    }

                    announceWinner(winner, betTarget, betAmount);
                }
            }, 50); // 0.05초 주기로 엔진 가동
        }, 10);
    }

    function announceWinner(winner, betTarget, betAmount) {
        const resultText = document.getElementById('result-text');
        const winnerName = winner === "mushroom" ? "주황버섯" : "슬라임";
        
        if (winner === betTarget) {
            const winMeso = betAmount * 2;
            myMeso += winMeso;
            resultText.innerHTML = `결과: <span style="color:blue;">[${winnerName}]</span> 승리!<br>${winMeso}메소를 얻었습니다!`;
        } else {
            resultText.innerHTML = `결과: <span style="color:red;">[${winnerName}]</span> 승리!<br>${betAmount}메소를 잃었습니다.`;
        }

        document.getElementById('meso-display').innerText = myMeso;

        // 💡 올인 구제책 (순차적 팝업 연출 및 1000메소 상향)
        if (myMeso < 100) {
            alert("당신은 돈을 모두 잃었습니다");
            alert("신창섭 님께서 당신에게 1000메소를 기부했습니다");
            myMeso = 1000; // 1000메소 지급
            document.getElementById('meso-display').innerText = myMeso;
        }
    }
</script>

</body>
</html>
