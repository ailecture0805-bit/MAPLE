<!DOCTYPE html>
<html lang="ko">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>메이플 월드</title>
    <style>
        html, body {
            overflow-x: hidden;
            position: relative;
            width: 100%;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            margin: 0;
            padding: 10px; 
            box-sizing: border-box;
        }
        
        /* 💡 HALF 버튼 추가 및 UI 밸런스를 위해 가로폭 가이드라인 미세 조정 */
        #game-container {
            max-width: 500px; 
            width: 100%;
            height: 740px; 
            margin: 0 auto;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
        }
        .status-panel {
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        .betthing-panel {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px; 
            width: 100%;
            box-sizing: border-box;
        }

        .panel-row {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            gap: 4px; /* 버튼이 하나 더 늘어났으므로 간격을 4px로 조율 */
        }
        
        input, select, button {
            padding: 12px 2px; /* 가로 압축을 위해 패딩 조율 */
            font-size: 13px; 
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-weight: bold; 
        }
        
        .target-btn {
            flex: 1;
            max-width: 150px;
            background-color: #f9f9f9;
            color: #333;
            cursor: pointer;
            border: 2px solid #ccc;
            padding: 12px 0; 
            text-align: center;
            transition: all 0.2s ease;
            flex-shrink: 0; 
        }
        .target-btn.active {
            background-color: #ffe6cc;
            border-color: #ff9900;
            color: #ff6600;
            transform: scale(1.03);
            box-shadow: 0 0 6px rgba(255, 153, 0, 0.4);
        }

        #bet-amount {
            width: 55px; /* HALF 버튼 자리를 위해 인풋 너비 최적화 */
            text-align: right;
            padding-right: 4px; 
            background-color: #f5f5f5;
            color: #333;
            flex-shrink: 0;
        }

        .bet-ctrl-btn {
            width: 40px; 
            background-color: #e1e1e1;
            color: #333;
            cursor: pointer;
            padding: 12px 0; 
            text-align: center;
            flex-shrink: 0;
        }
        .bet-ctrl-btn:hover {
            background-color: #d2d2d2;
        }
        
        #start-btn {
            width: 100%;
            max-width: 320px;
            background-color: #ff9900;
            color: white;
            cursor: pointer;
            border: none;
            padding: 14px 0; 
            font-size: 18px; 
            letter-spacing: 2px;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        
        #track {
            position: relative;
            width: 340px;
            height: 200px;
            background-color: #e2f0d9; 
            border: 3px solid #70ad47;
            border-radius: 5px;
            overflow: hidden;
            margin: 20px auto 0 auto; 
            box-sizing: border-box;
        }
        .lane:first-child {
            border-bottom: 2px dashed #70ad47;
        }

        .lane {
            position: relative;
            height: 100px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
        }
        
        .character {
            position: absolute;
            left: 10px;
            width: 60px;
            height: 60px;
            transition: left 0.025s linear; 
            transform: scaleX(-1); 
        }
        
        .finish-line {
            position: absolute;
            right: 20px;
            top: 0;
            width: 5px;
            height: 100%;
            background-color: red;
        }

        .msg-area {
            margin-top: 25px;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center;
        }

        #result-text {
            margin: 0;
            font-size: 22px; 
            color: #333;
            line-height: 1.5;
            font-weight: bold; 
        }

        #click-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="click-overlay" onclick="nextStep()"></div>

<div id="game-container">
    <h1>헤네시스 비밀 도박장</h1>
    
    <div class="status-panel">
        내 재산: <span id="meso-display">1000</span>메소
    </div>

    <div class="betthing-panel">
        
        <!-- 1층: 캐릭터 선택 -->
        <div class="panel-row">
            <button id="target-mushroom" class="target-btn active" onclick="selectTarget('mushroom')">주황버섯</button>
            <button id="target-slime" class="target-btn" onclick="selectTarget('slime')">슬라임</button>
        </div>

        <!-- 2층: 금액 배팅 (HALF 버튼 추가 배치 완료) -->
        <div class="panel-row">
            <input type="number" id="bet-amount" value="0" min="0" step="100" readonly>
            <button class="bet-ctrl-btn" onclick="changeBet(-100)">-100</button>
            <button class="bet-ctrl-btn" onclick="changeBet(100)">+100</button>
            <button class="bet-ctrl-btn" style="background-color: #ccf2ff;" onclick="setBetHalf()">HALF</button>
            <button class="bet-ctrl-btn" style="background-color: #ffcc00;" onclick="setBetMax()">MAX</button>
        </div>

        <!-- 3층: 시작 버튼 -->
        <div class="panel-row">
            <button id="start-btn" onclick="startRace()">경기 시작</button>
        </div>
        
    </div>

    <div id="track">
        <div class="lane">
            <img id="mushroom" class="character" src="mushroom.webp" alt="주황버섯">
        </div>
        <div class="lane">
            <img id="slime" class="character" src="slime.webp" alt="슬라임">
        </div>
        <div class="finish-line"></div>
    </div>
    
    <div class="msg-area">
        <div id="result-text"></div>
    </div>
</div>

<script>
    let myMeso = 1000;
    let raceInterval;
    let isRacing = false;
    let selectedTarget = 'mushroom';
    
    let currentPhase = "ready"; 

    function selectTarget(target) {
        if (isRacing || currentPhase !== "ready") return;
        selectedTarget = target;
        
        document.getElementById('target-mushroom').classList.remove('active');
        document.getElementById('target-slime').classList.remove('active');
        
        if (target === 'mushroom') {
            document.getElementById('target-mushroom').classList.add('active');
        } else {
            document.getElementById('target-slime').classList.add('active');
        }
    }

    function changeBet(amount) {
        if (isRacing || currentPhase !== "ready") return;
        const sendInput = document.getElementById('bet-amount');
        let currentBet = parseInt(sendInput.value) || 0;
        let newBet = currentBet + amount;
        
        if (newBet < 0) newBet = 0; 
        if (newBet > myMeso) newBet = Math.floor(myMeso / 100) * 100; 

        sendInput.value = newBet;
    }

    // 💡 [HALF 버튼 로직] 전재산의 절반을 계산하고 100원 미만 단위(50원 등)는 내림 처리
    function setBetHalf() {
        if (isRacing || currentPhase !== "ready") return;
        const sendInput = document.getElementById('bet-amount');
        let halfMeso = myMeso / 2;
        let finalHalfBet = Math.floor(halfMeso / 100) * 100; // 100원 단위 미만 버림
        sendInput.value = finalHalfBet < 0 ? 0 : finalHalfBet;
    }

    function setBetMax() {
        if (isRacing || currentPhase !== "ready") return;
        const sendInput = document.getElementById('bet-amount');
        let maxBet = Math.floor(myMeso / 100) * 100;
        sendInput.value = maxBet < 0 ? 0 : maxBet;
    }

    // 💡 몬스터들을 출발선(10px 지점)으로 정직하게 원위치시키는 공용 리셋 함수 생성
    function resetMonsters() {
        const mushroom = document.getElementById('mushroom');
        const slime = document.getElementById('slime');
        mushroom.style.transition = 'none';
        slime.style.transition = 'none';
        mushroom.style.left = '10px';
        slime.style.left = '10px';
    }

    function startRace() {
        if (isRacing || currentPhase !== "ready") return;

        const betTarget = selectedTarget;
        const betAmount = parseInt(document.getElementById('bet-amount').value);
        const resultText = document.getElementById('result-text');

        if (isNaN(betAmount) || betAmount < 0) {
            resultText.innerHTML = `<span style="color:red; font-weight:bold;">올바른 배팅 금액이 아닙니다.</span>`;
            return;
        }
        
        if (betAmount > myMeso) {
            resultText.innerHTML = `<span style="color:red; font-weight:bold;">보유한 메소보다 많이 걸 수 없습니다.</span><br><span style="color:#888; font-size:14px; font-weight:normal; display:block; margin-top:5px;">[화면을 누르면 다음으로 넘어갑니다]</span>`;
            currentPhase = "warning_reset";
            document.getElementById('click-overlay').style.display = "block";
            return;
        }

        myMeso -= betAmount;
        document.getElementById('meso-display').innerText = myMeso;
        isRacing = true;
        document.getElementById('start-btn').disabled = true;
        
        document.getElementById('target-mushroom').disabled = true;
        document.getElementById('target-slime').disabled = true;
        
        resultText.innerText = "우우우! 쌀쌀쌀!";

        // 레이스 개시 직전 확실하게 포지션 초기화
        resetMonsters();

        const mushroom = document.getElementById('mushroom');
        const slime = document.getElementById('slime');
        let mushroomLeft = 10;
        let slimeLeft = 10;
        
        setTimeout(() => {
            mushroom.style.transition = 'left 0.025s linear';
            slime.style.transition = 'left 0.025s linear';
            
            raceInterval = setInterval(() => {
                mushroomLeft += Math.floor(Math.random() * 8);
                slimeLeft += Math.floor(Math.random() * 8);

                mushroom.style.left = mushroomLeft + 'px';
                slime.style.left = slimeLeft + 'px';

                const trackWidth = document.getElementById('track').clientWidth - 80; 

                if (mushroomLeft >= trackWidth || slimeLeft >= trackWidth) {
                    clearInterval(raceInterval);
                    isRacing = false;

                    let winner = "";
                    if (mushroomLeft === slimeLeft) {
                        winner = Math.random() > 0.5 ? "mushroom" : "slime";
                    } else {
                        winner = mushroomLeft > slimeLeft ? "mushroom" : "slime";
                    }

                    handleRaceEnd(winner, betTarget, betAmount);
                }
            }, 25); 
        }, 10);
    }

    function handleRaceEnd(winner, betTarget, betAmount) {
        const resultText = document.getElementById('result-text');
        const winnerName = winner === "mushroom" ? "주황버섯" : "슬라임";
        
        if (winner === betTarget) {
            const winMeso = betAmount * 2;
            myMeso += winMeso;
            resultText.innerHTML = `<span style="color:blue; font-weight:bold;">[${winnerName}] 승리!</span><br><span style="font-weight:bold;">${winMeso}메소를 얻었습니다!</span><br><span style="color:#888; font-size:14px; font-weight:normal; display:block; margin-top:5px;">[화면을 누르면 다음으로 넘어갑니다]</span>`;
        } else {
            resultText.innerHTML = `<span style="color:red; font-weight:bold;">[${winnerName}] 승리!</span><br><span style="font-weight:bold;">${betAmount}메소를 잃었습니다.</span><br><span style="color:#888; font-size:14px; font-weight:normal; display:block; margin-top:5px;">[화면을 누르면 다음으로 넘어갑니다]</span>`;
        }

        document.getElementById('meso-display').innerText = myMeso;

        if (myMeso < 100) {
            currentPhase = "broke_step1";
        } else {
            currentPhase = "normal_reset";
        }
        
        document.getElementById('click-overlay').style.display = "block";
    }

    function nextStep() {
        const resultText = document.getElementById('result-text');
        
        if (currentPhase === "warning_reset") {
            resultText.innerHTML = "";
            currentPhase = "ready";
            document.getElementById('click-overlay').style.display = "none";
            resetMonsters(); // 경고창 취소 시에도 복귀
        } 
        else if (currentPhase === "normal_reset") {
            resultText.innerHTML = "";
            document.getElementById('start-btn').disabled = false;
            document.getElementById('target-mushroom').disabled = false;
            document.getElementById('target-slime').disabled = false;
            currentPhase = "ready";
            document.getElementById('click-overlay').style.display = "none";
            resetMonsters(); // 💡 일반 게임 종료 후 화면 클릭 시 제자리 복귀 적용
        } 
        else if (currentPhase === "broke_step1") {
            resultText.innerHTML = `<span style="color:#cc0000; font-weight:bold;">당신은 돈을 모두 잃었습니다.</span><br><span style="color:#888; font-size:14px; font-weight:normal; display:block; margin-top:5px;">[화면을 누르면 다음으로 넘어갑니다]</span>`;
            currentPhase = "broke_step2";
        } 
        else if (currentPhase === "broke_step2") {
            myMeso = 500;
            document.getElementById('meso-display').innerText = myMeso;
            document.getElementById('bet-amount').value = 0; 
            
            resultText.innerHTML = `<span style="color:#ff6600; font-weight:bold;">신창섭 님께서 당신에게 500메소를 기부했습니다!</span><br><span style="color:#888; font-size:14px; font-weight:normal; display:block; margin-top:5px;">[화면을 누르면 다음으로 넘어갑니다]</span>`;
            currentPhase = "broke_final";
        } 
        else if (currentPhase === "broke_final") {
            resultText.innerHTML = "";
            document.getElementById('start-btn').disabled = false;
            document.getElementById('target-mushroom').disabled = false;
            document.getElementById('target-slime').disabled = false;
            selectTarget('mushroom'); 
            currentPhase = "ready";
            document.getElementById('click-overlay').style.display = "none";
            resetMonsters(); // 💡 파산 구제 단계가 완전히 끝난 뒤에도 제자리 복귀 적용
        }
    }
</script>

</body>
</html>
